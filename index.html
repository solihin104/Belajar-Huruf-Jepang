<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Manabu - Belajar Hiragana & Katakana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .stroke-path {
    fill: none;
    stroke: #4f46e5;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation: drawStroke 1s forwards;
}

@keyframes drawStroke {
    to {
        stroke-dashoffset: 0;
    }
}
        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        /* Smooth tab transitions */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <div class="p-4 md:p-8">
        <!-- Header -->
        <header class="max-w-5xl mx-auto mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-indigo-700">Nihongo Manabu</h1>
                <p class="text-slate-500">Belajar Hiragana & Katakana Terstruktur</p>
            </div>
            
            <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 self-start md:self-auto">
                <button onclick="setScript('hiragana')" id="btn-hiragana" class="px-4 py-2 rounded-lg transition-all font-medium bg-indigo-600 text-white">
                    Hiragana
                </button>
                <button onclick="setScript('katakana')" id="btn-katakana" class="px-4 py-2 rounded-lg transition-all font-medium text-slate-600 hover:bg-slate-100">
                    Katakana
                </button>
            </div>
        </header>

        <!-- Main Navigation -->
        <nav class="max-w-5xl mx-auto mb-6 flex justify-center gap-2 overflow-x-auto pb-2">
            <button onclick="setView('chart')" id="nav-chart" class="flex items-center gap-2 px-5 py-3 rounded-2xl font-semibold transition-all whitespace-nowrap bg-white shadow-md text-indigo-600 ring-1 ring-slate-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                Tabel
            </button>
            <button onclick="setView('flashcards')" id="nav-flashcards" class="flex items-center gap-2 px-5 py-3 rounded-2xl font-semibold transition-all whitespace-nowrap text-slate-500 hover:bg-white/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                Flashcards
            </button>
            <button onclick="setView('quiz')" id="nav-quiz" class="flex items-center gap-2 px-5 py-3 rounded-2xl font-semibold transition-all whitespace-nowrap text-slate-500 hover:bg-white/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10v6"/><path d="M6 12h12"/><path d="M11 3v9"/><path d="M13 3v9"/></svg>
                Kuis
            </button>
        </nav>

        <!-- Category Selection -->
        <div id="category-nav" class="max-w-5xl mx-auto mb-8 flex flex-wrap justify-center gap-2">
            <button onclick="setCategory('seion')" id="cat-seion" class="px-4 py-1.5 rounded-full text-sm font-medium transition-all bg-indigo-100 text-indigo-700 ring-1 ring-indigo-300">Utama (Seion)</button>
            <button onclick="setCategory('dakuon')" id="cat-dakuon" class="px-4 py-1.5 rounded-full text-sm font-medium transition-all bg-slate-200 text-slate-600 hover:bg-slate-300">Dakuon/Handakuon</button>
            <button onclick="setCategory('yoon')" id="cat-yoon" class="px-4 py-1.5 rounded-full text-sm font-medium transition-all bg-slate-200 text-slate-600 hover:bg-slate-300">Kombinasi (Yoon)</button>
        </div>

        <!-- Main Content -->
        <main class="max-w-5xl mx-auto min-h-[500px]">
            <!-- CHART VIEW -->
            <div id="view-chart" class="tab-content active">
                <div id="chart-grid" class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 grid grid-cols-5 gap-2 md:gap-4">
                    <!-- JS populated -->
                </div>
            </div>

            <!-- FLASHCARDS VIEW -->
            <div id="view-flashcards" class="tab-content">
                <div class="flex flex-col items-center gap-8">
                    <div onclick="flipCard()" class="relative w-full max-w-sm h-80 cursor-pointer perspective-1000">
                        <div id="flashcard-inner" class="card-inner relative w-full h-full">
                            <!-- Front -->
                            <div class="absolute inset-0 bg-white border-2 border-indigo-50 rounded-3xl shadow-2xl flex flex-col items-center justify-center backface-hidden">
                                <span id="card-char" class="text-9xl font-bold text-slate-800">あ</span>
                                <p class="mt-8 text-slate-400 text-sm flex items-center gap-2">Klik untuk melihat romaji</p>
                            </div>
                            <!-- Back -->
                            <div class="absolute inset-0 bg-indigo-600 text-white rounded-3xl shadow-2xl flex flex-col items-center justify-center backface-hidden rotate-y-180">
                                <span id="card-romaji" class="text-7xl font-bold uppercase tracking-tighter">A</span>
                                <p class="mt-8 text-indigo-200 text-sm">Pronunsiasi Romaji</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-8">
                        <button onclick="prevCard()" class="p-4 bg-white rounded-full shadow-lg text-slate-600 hover:text-indigo-600 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <div class="text-center">
                            <span id="card-index" class="text-2xl font-bold text-slate-700">1</span>
                            <span id="card-total" class="text-slate-400 font-medium"> / 46</span>
                        </div>
                        <button onclick="nextCard()" class="p-4 bg-white rounded-full shadow-lg text-slate-600 hover:text-indigo-600 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- QUIZ VIEW -->
            <div id="view-quiz" class="tab-content">
                <div class="max-w-md mx-auto">
                    <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center">
                        <div class="flex justify-between items-center mb-10">
                            <div class="text-left">
                                <p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">Skor Akurasi</p>
                                <div class="flex items-baseline gap-1">
                                    <span id="quiz-score" class="text-3xl font-black text-indigo-600">0</span>
                                    <span id="quiz-total" class="text-slate-400 font-bold">/ 0</span>
                                </div>
                            </div>
                            <button onclick="resetQuiz()" class="p-2 text-slate-300 hover:text-rose-400 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                            </button>
                        </div>

                        <div class="mb-12 py-8 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                            <span id="quiz-question" class="text-8xl font-bold text-slate-800 block mb-2">あ</span>
                            <p class="text-slate-400 text-sm font-medium">Bagaimana cara membaca ini?</p>
                        </div>

                        <div id="quiz-options" class="grid grid-cols-2 gap-4">
                            <!-- JS populated -->
                        </div>

                        <div id="quiz-feedback" class="h-12 mt-6 flex items-center justify-center font-black text-xl">
                            <!-- JS populated -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20 text-center text-slate-400 text-sm border-t border-slate-200 pt-8">
            <p class="font-medium">Nihongo Manabu Project - Belajar Hiragana & Katakana</p>
        </footer>
    </div>

    <script>
        const SCRIPTS = {
            hiragana: {
                seion: [
                    { char: 'あ', romaji: 'a' }, { char: 'い', romaji: 'i' }, { char: 'う', romaji: 'u' }, { char: 'え', romaji: 'e' }, { char: 'お', romaji: 'o' },
                    { char: 'か', romaji: 'ka' }, { char: 'き', romaji: 'ki' }, { char: 'く', romaji: 'ku' }, { char: 'け', romaji: 'ke' }, { char: 'こ', romaji: 'ko' },
                    { char: 'さ', romaji: 'sa' }, { char: 'し', romaji: 'shi' }, { char: 'す', romaji: 'su' }, { char: 'せ', romaji: 'se' }, { char: 'そ', romaji: 'so' },
                    { char: 'た', romaji: 'ta' }, { char: 'ち', romaji: 'chi' }, { char: 'つ', romaji: 'tsu' }, { char: 'て', romaji: 'te' }, { char: 'と', romaji: 'to' },
                    { char: 'な', romaji: 'na' }, { char: 'に', romaji: 'ni' }, { char: 'ぬ', romaji: 'nu' }, { char: 'ね', romaji: 'ne' }, { char: 'の', romaji: 'no' },
                    { char: 'は', romaji: 'ha' }, { char: 'ひ', romaji: 'hi' }, { char: 'ふ', romaji: 'fu' }, { char: 'へ', romaji: 'he' }, { char: 'ほ', romaji: 'ho' },
                    { char: 'ま', romaji: 'ma' }, { char: 'み', romaji: 'mi' }, { char: 'む', romaji: 'mu' }, { char: 'め', romaji: 'me' }, { char: 'も', romaji: 'mo' },
                    { char: 'や', romaji: 'ya' }, { char: '', romaji: '' }, { char: 'ゆ', romaji: 'yu' }, { char: '', romaji: '' }, { char: 'よ', romaji: 'yo' },
                    { char: 'ら', romaji: 'ra' }, { char: 'り', romaji: 'ri' }, { char: 'る', romaji: 'ru' }, { char: 'れ', romaji: 're' }, { char: 'ろ', romaji: 'ro' },
                    { char: 'わ', romaji: 'wa' }, { char: '', romaji: '' }, { char: '', romaji: '' }, { char: '', romaji: '' }, { char: 'を', romaji: 'wo' },
                    { char: 'ん', romaji: 'n' }
                ],
                dakuon: [
                    { char: 'が', romaji: 'ga' }, { char: 'ぎ', romaji: 'gi' }, { char: 'ぐ', romaji: 'gu' }, { char: 'げ', romaji: 'ge' }, { char: 'ご', romaji: 'go' },
                    { char: 'ざ', romaji: 'za' }, { char: 'じ', romaji: 'ji' }, { char: 'ず', romaji: 'zu' }, { char: 'ぜ', romaji: 'ze' }, { char: 'ぞ', romaji: 'zo' },
                    { char: 'だ', romaji: 'da' }, { char: 'ぢ', romaji: 'ji' }, { char: 'づ', romaji: 'zu' }, { char: 'で', romaji: 'de' }, { char: 'ど', romaji: 'do' },
                    { char: 'ば', romaji: 'ba' }, { char: 'び', romaji: 'bi' }, { char: 'ぶ', romaji: 'bu' }, { char: 'べ', romaji: 'be' }, { char: 'ぼ', romaji: 'bo' },
                    { char: 'ぱ', romaji: 'pa' }, { char: 'ぴ', romaji: 'pi' }, { char: 'ぷ', romaji: 'pu' }, { char: 'ぺ', romaji: 'pe' }, { char: 'ぽ', romaji: 'po' }
                ],
                yoon: [
                    { char: 'きゃ', romaji: 'kya' }, { char: 'きゅ', romaji: 'kyu' }, { char: 'きょ', romaji: 'kyo' },
                    { char: 'しゃ', romaji: 'sha' }, { char: 'しゅ', romaji: 'shu' }, { char: 'しょ', romaji: 'sho' },
                    { char: 'ちゃ', romaji: 'cha' }, { char: 'ちゅ', romaji: 'chu' }, { char: 'ちょ', romaji: 'cho' },
                    { char: 'にゃ', romaji: 'nya' }, { char: 'にゅ', romaji: 'nyu' }, { char: 'にょ', romaji: 'nyo' },
                    { char: 'ひゃ', romaji: 'hya' }, { char: 'ひゅ', romaji: 'hyu' }, { char: 'ひょ', romaji: 'hyo' },
                    { char: 'みゃ', romaji: 'mya' }, { char: 'miゅ', romaji: 'myu' }, { char: 'みょ', romaji: 'myo' },
                    { char: 'りゃ', romaji: 'rya' }, { char: 'りゅ', romaji: 'ryu' }, { char: 'りょ', romaji: 'ryo' },
                    { char: 'ぎゃ', romaji: 'gya' }, { char: 'ぎゅ', romaji: 'gyu' }, { char: 'ぎょ', romaji: 'gyo' },
                    { char: 'じゃ', romaji: 'ja' }, { char: 'じゅ', romaji: 'ju' }, { char: 'じょ', romaji: 'jo' },
                    { char: 'びゃ', romaji: 'bya' }, { char: 'びゅ', romaji: 'byu' }, { char: 'びょ', romaji: 'byo' },
                    { char: 'ぴゃ', romaji: 'pya' }, { char: 'ぴゅ', romaji: 'pyu' }, { char: 'ぴょ', romaji: 'pyo' }
                ]
            },
            katakana: {
                seion: [
                    { char: 'ア', romaji: 'a' }, { char: 'イ', romaji: 'i' }, { char: 'ウ', romaji: 'u' }, { char: 'エ', romaji: 'e' }, { char: 'オ', romaji: 'o' },
                    { char: 'カ', romaji: 'ka' }, { char: 'キ', romaji: 'ki' }, { char: 'ク', romaji: 'ku' }, { char: 'ケ', romaji: 'ke' }, { char: 'コ', romaji: 'ko' },
                    { char: 'サ', romaji: 'sa' }, { char: 'シ', romaji: 'shi' }, { char: 'ス', romaji: 'su' }, { char: 'セ', romaji: 'se' }, { char: 'ソ', romaji: 'so' },
                    { char: 'タ', romaji: 'ta' }, { char: 'チ', romaji: 'chi' }, { char: 'ツ', romaji: 'tsu' }, { char: 'テ', romaji: 'te' }, { char: 'ト', romaji: 'to' },
                    { char: 'ナ', romaji: 'na' }, { char: 'ニ', romaji: 'ni' }, { char: 'ヌ', romaji: 'nu' }, { char: 'ネ', romaji: 'ne' }, { char: 'ノ', romaji: 'no' },
                    { char: 'ハ', romaji: 'ha' }, { char: 'ヒ', romaji: 'hi' }, { char: 'フ', romaji: 'fu' }, { char: 'ヘ', romaji: 'he' }, { char: 'ホ', romaji: 'ho' },
                    { char: 'マ', romaji: 'ma' }, { char: 'ミ', romaji: 'mi' }, { char: 'ム', romaji: 'mu' }, { char: 'メ', romaji: 'me' }, { char: 'モ', romaji: 'mo' },
                    { char: 'ヤ', romaji: 'ya' }, { char: '', romaji: '' }, { char: 'ユ', romaji: 'yu' }, { char: '', romaji: '' }, { char: 'ヨ', romaji: 'yo' },
                    { char: 'ラ', romaji: 'ra' }, { char: 'リ', romaji: 'ri' }, { char: 'ル', romaji: 'ru' }, { char: 'レ', romaji: 're' }, { char: 'ロ', romaji: 'ro' },
                    { char: 'ワ', romaji: 'wa' }, { char: '', romaji: '' }, { char: '', romaji: '' }, { char: '', romaji: '' }, { char: 'ヲ', romaji: 'wo' },
                    { char: 'ン', romaji: 'n' }
                ],
                dakuon: [
                    { char: 'ガ', romaji: 'ga' }, { char: 'ギ', romaji: 'gi' }, { char: 'グ', romaji: 'gu' }, { char: 'ゲ', romaji: 'ge' }, { char: 'ゴ', romaji: 'go' },
                    { char: 'ザ', romaji: 'za' }, { char: 'ジ', romaji: 'ji' }, { char: 'ズ', romaji: 'zu' }, { char: 'ゼ', romaji: 'ze' }, { char: 'ゾ', romaji: 'zo' },
                    { char: 'ダ', romaji: 'da' }, { char: 'ヂ', romaji: 'ji' }, { char: 'ヅ', romaji: 'zu' }, { char: 'デ', romaji: 'de' }, { char: 'ド', romaji: 'do' },
                    { char: 'バ', romaji: 'ba' }, { char: 'ビ', romaji: 'bi' }, { char: 'ブ', romaji: 'bu' }, { char: 'ベ', romaji: 'be' }, { char: 'ボ', romaji: 'bo' },
                    { char: 'パ', romaji: 'pa' }, { char: 'ピ', romaji: 'pi' }, { char: 'プ', romaji: 'pu' }, { char: 'ペ', romaji: 'pe' }, { char: 'ポ', romaji: 'po' }
                ],
                yoon: [
                    { char: 'キャ', romaji: 'kya' }, { char: 'キュ', romaji: 'kyu' }, { char: 'キョ', romaji: 'kyo' },
                    { char: 'シャ', romaji: 'sha' }, { char: 'シュ', romaji: 'shu' }, { char: 'ショ', romaji: 'sho' },
                    { char: 'チャ', romaji: 'cha' }, { char: 'チュ', romaji: 'chu' }, { char: 'チョ', romaji: 'cho' },
                    { char: 'ニャ', romaji: 'nya' }, { char: 'ニュ', romaji: 'nyu' }, { char: 'ニョ', romaji: 'nyo' },
                    { char: 'ヒャ', romaji: 'hya' }, { char: 'ヒュ', romaji: 'hyu' }, { char: 'ヒョ', romaji: 'hyo' },
                    { char: 'ミャ', romaji: 'mya' }, { char: 'ミュ', romaji: 'myu' }, { char: 'ミョ', romaji: 'myo' },
                    { char: 'リャ', romaji: 'rya' }, { char: 'リュ', romaji: 'ryu' }, { char: 'リョ', romaji: 'ryo' },
                    { char: 'ギャ', romaji: 'gya' }, { char: 'ギュ', romaji: 'gyu' }, { char: 'ギョ', romaji: 'gyo' },
                    { char: 'ジャ', romaji: 'ja' }, { char: 'ジュ', romaji: 'ju' }, { char: 'ジョ', romaji: 'jo' },
                    { char: 'ビャ', romaji: 'bya' }, { char: 'ビュ', romaji: 'byu' }, { char: 'ビョ', romaji: 'byo' },
                    { char: 'ピャ', romaji: 'pya' }, { char: 'ピュ', romaji: 'pyu' }, { char: 'ピョ', romaji: 'pyo' }
                ]
            }
        };

        // State
        let currentScript = 'hiragana';
        let currentCategory = 'seion';
        let currentView = 'chart';
        let cardIndex = 0;
        let quizScore = 0;
        let quizTotal = 0;
        let currentQuestion = null;
        let quizLocked = false;

        // Init
        window.onload = () => {
            renderChart();
            updateFlashcard();
        };

        // UI Handlers
        function setScript(type) {
            currentScript = type;
            document.getElementById('btn-hiragana').className = type === 'hiragana' ? 'px-4 py-2 rounded-lg transition-all font-medium bg-indigo-600 text-white' : 'px-4 py-2 rounded-lg transition-all font-medium text-slate-600 hover:bg-slate-100';
            document.getElementById('btn-katakana').className = type === 'katakana' ? 'px-4 py-2 rounded-lg transition-all font-medium bg-indigo-600 text-white' : 'px-4 py-2 rounded-lg transition-all font-medium text-slate-600 hover:bg-slate-100';
            
            cardIndex = 0;
            renderChart();
            updateFlashcard();
            if (currentView === 'quiz') startQuiz();
        }

        function setCategory(cat) {
            currentCategory = cat;
            ['seion', 'dakuon', 'yoon'].forEach(c => {
                document.getElementById(`cat-${c}`).className = c === cat ? 'px-4 py-1.5 rounded-full text-sm font-medium transition-all bg-indigo-100 text-indigo-700 ring-1 ring-indigo-300' : 'px-4 py-1.5 rounded-full text-sm font-medium transition-all bg-slate-200 text-slate-600 hover:bg-slate-300';
            });
            cardIndex = 0;
            renderChart();
            updateFlashcard();
        }

        function setView(view) {
            currentView = view;
            ['chart', 'flashcards', 'quiz'].forEach(v => {
                document.getElementById(`view-${v}`).classList.toggle('active', v === view);
                document.getElementById(`nav-${v}`).className = v === view ? 'flex items-center gap-2 px-5 py-3 rounded-2xl font-semibold transition-all whitespace-nowrap bg-white shadow-md text-indigo-600 ring-1 ring-slate-200' : 'flex items-center gap-2 px-5 py-3 rounded-2xl font-semibold transition-all whitespace-nowrap text-slate-500 hover:bg-white/50';
            });

            document.getElementById('category-nav').style.display = view === 'quiz' ? 'none' : 'flex';
            
            if (view === 'quiz') startQuiz();
        }

        // Logic - Chart
        function renderChart() {
            const grid = document.getElementById('chart-grid');
            const data = SCRIPTS[currentScript][currentCategory];
            grid.className = currentCategory === 'yoon' ? 'bg-white rounded-3xl shadow-xl p-6 border border-slate-100 grid grid-cols-3 gap-2 md:gap-4' : 'bg-white rounded-3xl shadow-xl p-6 border border-slate-100 grid grid-cols-5 gap-2 md:gap-4';
            
            grid.innerHTML = data.map(item => `
<div onclick="showStroke('${item.char}')"
class="aspect-square flex flex-col items-center justify-center rounded-2xl border transition-all cursor-pointer
${item.char === '' ? 'border-transparent' : 'border-slate-100 hover:border-indigo-300 hover:bg-indigo-50/30'}">

<span class="${currentCategory === 'yoon' ? 'text-xl md:text-3xl' : 'text-2xl md:text-4xl'} font-bold mb-1 text-slate-800">
${item.char}
</span>

<span class="text-xs md:text-sm text-slate-400 uppercase font-mono">
${item.romaji}
</span>

</div>
`).join('');
        }

        // Logic - Flashcards
        function getValidChars() {
            return SCRIPTS[currentScript][currentCategory].filter(i => i.char !== '');
        }

        function updateFlashcard() {
            const chars = getValidChars();
            if (cardIndex >= chars.length) cardIndex = 0;
            
            document.getElementById('card-char').textContent = chars[cardIndex].char;
            document.getElementById('card-romaji').textContent = chars[cardIndex].romaji;
            document.getElementById('card-index').textContent = cardIndex + 1;
            document.getElementById('card-total').textContent = ` / ${chars.length}`;
            
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }

        function flipCard() {
            document.getElementById('flashcard-inner').classList.toggle('is-flipped');
        }

        function nextCard() {
            const chars = getValidChars();
            cardIndex = (cardIndex + 1) % chars.length;
            updateFlashcard();
        }

        function prevCard() {
            const chars = getValidChars();
            cardIndex = (cardIndex - 1 + chars.length) % chars.length;
            updateFlashcard();
        }

        // Logic - Quiz
        function startQuiz() {
            const allChars = [...SCRIPTS[currentScript].seion, ...SCRIPTS[currentScript].dakuon, ...SCRIPTS[currentScript].yoon].filter(c => c.char !== '');
            const randomIdx = Math.floor(Math.random() * allChars.length);
            currentQuestion = allChars[randomIdx];
            
            let options = [currentQuestion.romaji];
            while (options.length < 4) {
                const opt = allChars[Math.floor(Math.random() * allChars.length)].romaji;
                if (!options.includes(opt)) options.push(opt);
            }
            options.sort(() => Math.random() - 0.5);

            document.getElementById('quiz-question').textContent = currentQuestion.char;
            const container = document.getElementById('quiz-options');
            container.innerHTML = options.map(opt => `
                <button onclick="checkAnswer('${opt}')" class="quiz-btn py-5 rounded-2xl border-2 font-bold text-2xl transition-all shadow-sm bg-white border-slate-100 text-slate-700 hover:border-indigo-400 hover:text-indigo-600 hover:shadow-lg active:scale-95">
                    ${opt.toUpperCase()}
                </button>
            `).join('');
            
            document.getElementById('quiz-feedback').innerHTML = '';
            quizLocked = false;
        }

        function checkAnswer(answer) {
            if (quizLocked) return;
            quizLocked = true;
            
            quizTotal++;
            const isCorrect = answer === currentQuestion.romaji;
            if (isCorrect) quizScore++;

            document.getElementById('quiz-score').textContent = quizScore;
            document.getElementById('quiz-total').textContent = `/ ${quizTotal}`;
            
            const feedback = document.getElementById('quiz-feedback');
            feedback.innerHTML = isCorrect ? '<span class="text-emerald-500 animate-bounce">BENAR!</span>' : '<span class="text-rose-500 animate-bounce">SALAH...</span>';

            // Highlight buttons
            const btns = document.querySelectorAll('.quiz-btn');
            btns.forEach(btn => {
                const text = btn.textContent.trim().toLowerCase();
                if (text === currentQuestion.romaji) {
                    btn.className = "py-5 rounded-2xl border-2 font-bold text-2xl transition-all shadow-sm bg-emerald-50 border-emerald-500 text-emerald-600 scale-105";
                } else if (!isCorrect && text === answer) {
                    btn.className = "py-5 rounded-2xl border-2 font-bold text-2xl transition-all shadow-sm bg-rose-50 border-rose-500 text-rose-600 opacity-50";
                } else {
                    btn.className = "py-5 rounded-2xl border-2 font-bold text-2xl transition-all shadow-sm bg-white border-slate-100 text-slate-200 opacity-50";
                }
            });

            setTimeout(startQuiz, 1200);
        }

        function resetQuiz() {
            quizScore = 0;
            quizTotal = 0;
            document.getElementById('quiz-score').textContent = "0";
            document.getElementById('quiz-total').textContent = "/ 0";
            startQuiz();
        }
        function closeStrokeModal() {
    document.getElementById("strokeModal").classList.add("hidden");
}

function showStroke(char) {
    const modal = document.getElementById("strokeModal");
    const title = document.getElementById("strokeTitle");
    const box = document.getElementById("strokeSVG");

    modal.classList.remove("hidden");
    modal.classList.add("flex");

    title.textContent = char;
    box.innerHTML = "Loading...";

    const code = char.codePointAt(0);

    fetch("./stroke/" + code + ".svg")
    .then(res => {
        if (!res.ok) throw new Error("not found");
        return res.text();
    })
    .then(svg => {
        box.innerHTML = svg;
    })
    .catch(err => {
        box.innerHTML = "File " + code + ".svg tidak ditemukan";
    });
}
    </script>
    <!-- Modal Stroke Order -->
<div id="strokeModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-6 w-[90%] max-w-md text-center relative">
        
        <button onclick="closeStrokeModal()" class="absolute top-3 right-3 text-2xl">
            ✖
        </button>

        <h2 id="strokeTitle" class="text-5xl font-bold mb-4">あ</h2>

        <svg id="strokeSVG" viewBox="0 0 200 200" class="w-64 h-64 mx-auto border rounded-xl bg-slate-50">
        </svg>

        <p class="mt-4 text-slate-500">Klik huruf lain untuk melihat cara menulis</p>
    </div>
</div>
